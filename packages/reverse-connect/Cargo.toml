[package]
name = "reverse-connect"
version = "0.1.0"
edition = "2024"
description = "Reverse WebSocket connector for exec and PTY channels"

[dependencies]
base64 = "0.22.1"
futures-util = "0.3.31"
http = "1.3.1"
portable-pty = "0.9.0"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.145"
thiserror = "2.0.17"
tokio = { version = "1.47.1", features = ["io-util", "macros", "process", "rt-multi-thread", "sync", "time"] }
tokio-tungstenite = { version = "0.28.0", features = ["rustls-tls-webpki-roots"] }

[dependencies.clap]
version = "4.5.48"
features = ["derive"]

[dev-dependencies]
axum = { version = "0.8.7", features = ["ws"] }
