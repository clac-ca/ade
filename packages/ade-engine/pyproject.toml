[project]
name = "ade-engine"
version = "2026.4.4.6"
description = "Core spreadsheet extraction engine for ADE"
readme = "README.md"
requires-python = ">=3.12"
dependencies = ["openpyxl>=3.1,<4"]

[project.scripts]
ade = "ade_engine.cli:main"

[dependency-groups]
test = ["pytest"]
lint = ["ruff"]
dev = [{ include-group = "test" }, { include-group = "lint" }]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = ["--import-mode=importlib"]

[tool.ruff]
target-version = "py312"

[build-system]
requires = ["uv_build>=0.9.28,<0.12.0"]
build-backend = "uv_build"
