[project]
name = "ade-config"
version = "2026.3.28.1"
description = "Installed ADE business rules package"
readme = "README.md"
requires-python = ">=3.12"
dependencies = ["ade-engine @ git+https://github.com/clac-ca/ade.git@ade-engine-v2026.3.28.1#subdirectory=packages/ade-engine"]

[dependency-groups]
test = ["pytest"]
lint = ["ruff"]
dev = [{ include-group = "test" }, { include-group = "lint" }]

# Local in-repo development uses the adjacent ade-engine source in editable mode.
[tool.uv.sources]
ade-engine = { path = "../ade-engine", editable = true }

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = ["--import-mode=importlib"]

[tool.ruff]
target-version = "py312"

[build-system]
requires = ["uv_build>=0.9.28,<0.12.0"]
build-backend = "uv_build"
