services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    command:
      [
        "azurite-blob",
        "--blobHost",
        "0.0.0.0",
        "--blobPort",
        "10000",
        "--location",
        "/data",
      ]
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:10000/devstoreaccount1?comp=list', (response) => process.exit(response.statusCode === 200 || response.statusCode === 403 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s
    ports:
      - "10000:10000"
    volumes:
      - azurite-data:/data

  sessionpool:
    build:
      context: ../..
      dockerfile: infra/local/sessionpool/Dockerfile
    platform: linux/amd64
    healthcheck:
      test:
        [
          "CMD",
          "session-pool-emulator",
          "healthcheck",
          "--host",
          "127.0.0.1",
          "--port",
          "9000",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s
    cpus: 4
    mem_limit: 4g
    ports:
      - "8014:9000"

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: "AdeLocal1!adeclean"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          '/opt/mssql-tools18/bin/sqlcmd -S 127.0.0.1 -U sa -P "$${MSSQL_SA_PASSWORD}" -C -Q "SELECT 1" || exit 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    ports:
      - "8013:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

volumes:
  azurite-data:
  sqlserver-data:
