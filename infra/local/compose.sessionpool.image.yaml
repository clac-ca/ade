services:
  sessionpool:
    image: ${ADE_SESSIONPOOL_IMAGE:?ADE_SESSIONPOOL_IMAGE must be set}
    platform: linux/amd64
    pull_policy: never
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        [
          "CMD",
          "session-pool-emulator",
          "healthcheck",
          "--host",
          "127.0.0.1",
          "--port",
          "9000",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 5s
    cpus: 4
    mem_limit: 4g
    ports:
      - "8014:9000"
    volumes:
      - ../../.package/configs:/emulator-configs:ro
