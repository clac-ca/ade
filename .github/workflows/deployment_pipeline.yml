name: Deployment Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  commit_stage:
    name: Commit Stage
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    outputs:
      release_candidate_image: ${{ steps.release_candidate_ref.outputs.release_candidate_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .node-version

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          python-version: "3.12"

      - name: Set up Rust
        run: |
          rustup toolchain install 1.94.0 --profile minimal --component clippy --component rustfmt
          rustup default 1.94.0

      - name: Restore Rust cache
        id: rust_cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
            apps/ade-api/target
          key: rust-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', 'apps/ade-api/Cargo.toml', 'apps/ade-api/Cargo.lock') }}
          restore-keys: |
            rust-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript typecheck
        run: pnpm typecheck

      - name: Run lint
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run Python tests
        run: pnpm test:python

      - name: Package Python distributions
        run: pnpm package:python

      - name: Save Rust cache
        if: always() && steps.rust_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
            apps/ade-api/target
          key: ${{ steps.rust_cache.outputs.cache-primary-key }}

      - name: Compute OCI build metadata
        id: build_metadata
        run: |
          built_at="$(git show --no-patch --format=%cI "${GITHUB_SHA}")"
          service_version="$(
            node --print "JSON.parse(require('node:fs').readFileSync('apps/ade-api/package.json', 'utf8')).version"
          )"

          echo "built_at=${built_at}" >> "${GITHUB_OUTPUT}"
          echo "git_sha=${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "service_version=${service_version}" >> "${GITHUB_OUTPUT}"

      - name: Extract image tags
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Bicep compilation
        run: |
          az bicep build --file infra/main.bicep --stdout >/dev/null
          az bicep build-params --file infra/environments/main.prod.bicepparam --stdout >/dev/null

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build release candidate image
        id: push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
          build-args: |
            BUILT_AT=${{ steps.build_metadata.outputs.built_at }}
            GIT_SHA=${{ steps.build_metadata.outputs.git_sha }}
            SERVICE_VERSION=${{ steps.build_metadata.outputs.service_version }}
          cache-from: type=gha,scope=ade-release-candidate
          cache-to: type=gha,scope=ade-release-candidate,mode=max

      - name: Export release candidate image ref
        if: github.event_name == 'push'
        id: release_candidate_ref
        run: |
          echo "release_candidate_image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}" >> "${GITHUB_OUTPUT}"

      - name: Generate artifact attestation
        if: github.event_name == 'push'
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  acceptance_stage:
    name: Acceptance Stage
    if: github.event_name == 'push'
    needs:
      - commit_stage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .node-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull release candidate
        run: docker pull "${{ needs.commit_stage.outputs.release_candidate_image }}"

      - name: Run acceptance tests
        run: pnpm test:acceptance --image "${{ needs.commit_stage.outputs.release_candidate_image }}"

  release_stage:
    name: Release Stage
    if: github.event_name == 'push'
    needs:
      - commit_stage
      - acceptance_stage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Log in to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}

      - name: Validate release candidate deployment
        run: |
          az deployment group validate \
            --name "ade-production-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-validate" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --parameters infra/environments/main.prod.bicepparam \
            --parameters image="${{ needs.commit_stage.outputs.release_candidate_image }}" \
            --validation-level Provider \
            --output none

      - name: Deploy release candidate
        id: deploy_release_candidate
        run: |
          migration_job_name="$(
            az deployment group create \
              --name "ade-production-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --parameters infra/environments/main.prod.bicepparam \
              --parameters image="${{ needs.commit_stage.outputs.release_candidate_image }}" \
              --query properties.outputs.migrationJobName.value \
              --output tsv
          )"

          echo "migration_job_name=${migration_job_name}" >> "${GITHUB_OUTPUT}"

      - name: Run database migrations
        env:
          ADE_MIGRATION_JOB_NAME: ${{ steps.deploy_release_candidate.outputs.migration_job_name }}
        run: |
          execution_name="$(
            az containerapp job start \
              --name "${ADE_MIGRATION_JOB_NAME}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --query name \
              --output tsv
          )"

          echo "Started migration job execution: ${execution_name}"

          for attempt in $(seq 1 90); do
            status="$(
              az containerapp job execution show \
                --name "${ADE_MIGRATION_JOB_NAME}" \
                --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
                --job-execution-name "${execution_name}" \
                --query properties.status \
                --output tsv 2>/dev/null || true
            )"

            if [ "${status}" = "Succeeded" ]; then
              echo "Migration job succeeded."
              exit 0
            fi

            if [ "${status}" = "Failed" ]; then
              echo "Migration job failed."
              az containerapp job execution show \
                --name "${ADE_MIGRATION_JOB_NAME}" \
                --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
                --job-execution-name "${execution_name}" \
                --output json
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for migration job execution ${execution_name}."
          exit 1
