name: Deployment Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions: {}

jobs:
  commit_stage:
    name: Commit Stage
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.publish_release_candidate.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .node-version

      - name: Set up uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        with:
          python-version: "3.12"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run commit-stage gate
        run: pnpm test

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GITHUB_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish release candidate
        id: publish_release_candidate
        if: github.event_name == 'push'
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/ade:sha-${GITHUB_SHA}"

          docker tag ade:local "${image}"
          docker push "${image}"

          echo "image=${image}" >> "${GITHUB_OUTPUT}"

  acceptance_stage:
    name: Acceptance Stage
    if: github.event_name == 'push'
    needs:
      - commit_stage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      AZURE_SQL_CONNECTIONSTRING: >-
        Server=sqlserver,1433;Database=ade;User Id=sa;Password=AdeAcceptance1!;Encrypt=false;TrustServerCertificate=true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .node-version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull release candidate
        run: docker pull "${{ needs.commit_stage.outputs.image }}"

      - name: Start acceptance dependencies
        run: docker compose -f infra/local/compose.yaml -p ade-acceptance up -d --wait sqlserver

      - name: Run acceptance migrations
        run: >
          docker run --rm
          --network ade-acceptance_default
          --env AZURE_SQL_CONNECTIONSTRING
          "${{ needs.commit_stage.outputs.image }}"
          node dist/migrate.js

      - name: Start release candidate
        run: |
          docker rm --force ade-acceptance-app 2>/dev/null || true
          docker run --detach --rm \
            --name ade-acceptance-app \
            --network ade-acceptance_default \
            --publish 4100:8000 \
            --env AZURE_SQL_CONNECTIONSTRING \
            "${{ needs.commit_stage.outputs.image }}"

      - name: Wait for release candidate
        run: |
          timeout 120 bash -c 'until curl -fsS http://127.0.0.1:4100/api/readyz; do sleep 1; done'

      - name: Run acceptance tests
        run: pnpm test:acceptance -- --url http://127.0.0.1:4100

      - name: Dump acceptance container logs
        if: failure()
        run: |
          docker logs ade-acceptance-app || true
          docker compose -f infra/local/compose.yaml -p ade-acceptance logs --no-color sqlserver || true

      - name: Stop acceptance environment
        if: always()
        run: |
          docker rm --force ade-acceptance-app || true
          docker compose -f infra/local/compose.yaml -p ade-acceptance down -v --remove-orphans || true

  release_stage:
    name: Release Stage
    if: github.event_name == 'push'
    needs:
      - commit_stage
      - acceptance_stage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment:
      name: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .node-version

      - name: Log in to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}

      - name: Deploy accepted release candidate
        id: deploy_release_candidate
        run: |
          migration_job_name="$(
            az deployment group create \
              --name "ade-production-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --template-file infra/main.bicep \
              --parameters @infra/environments/main.prod.parameters.json image="${{ needs.commit_stage.outputs.image }}" \
              --query properties.outputs.migrationJobName.value \
              --output tsv
          )"

          echo "migration_job_name=${migration_job_name}" >> "${GITHUB_OUTPUT}"

      - name: Run database migrations
        env:
          ADE_MIGRATION_JOB_NAME: ${{ steps.deploy_release_candidate.outputs.migration_job_name }}
        run: |
          execution_name="$(
            az containerapp job start \
              --name "${ADE_MIGRATION_JOB_NAME}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --query name \
              --output tsv
          )"

          echo "Started migration job execution: ${execution_name}"

          for attempt in $(seq 1 90); do
            status="$(
              az containerapp job execution list \
                --name "${ADE_MIGRATION_JOB_NAME}" \
                --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
                --query "[?name=='${execution_name}'] | [0].properties.status" \
                --output tsv
            )"

            if [ "${status}" = "Succeeded" ]; then
              echo "Migration job succeeded."
              exit 0
            fi

            if [ "${status}" = "Failed" ]; then
              echo "Migration job failed."
              az containerapp job execution list \
                --name "${ADE_MIGRATION_JOB_NAME}" \
                --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
                --query "[?name=='${execution_name}'] | [0]" \
                --output json
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for migration job execution ${execution_name}."
          exit 1
