name: Deployment Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

env:
  ADE_NODE_VERSION: "22.12.0"
  ADE_PNPM_VERSION: "10.30.1"

permissions: {}

jobs:
  commit_stage:
    name: Commit Stage
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.publish_release_candidate.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: ${{ env.ADE_PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version: ${{ env.ADE_NODE_VERSION }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test:unit

      - name: Build release candidate
        run: pnpm build

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GITHUB_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish release candidate
        id: publish_release_candidate
        if: github.event_name == 'push'
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/ade:sha-${GITHUB_SHA}"

          docker tag ade:local "${image}"
          docker push "${image}"

          echo "image=${image}" >> "${GITHUB_OUTPUT}"

  acceptance_stage:
    name: Acceptance Stage
    if: github.event_name == 'push'
    needs:
      - commit_stage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: ${{ env.ADE_PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version: ${{ env.ADE_NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull release candidate
        run: docker pull "${{ needs.commit_stage.outputs.image }}"

      - name: Start release candidate
        run: |
          docker rm --force ade-acceptance 2>/dev/null || true
          docker run --detach --rm --name ade-acceptance --publish 4100:8000 "${{ needs.commit_stage.outputs.image }}"

      - name: Wait for release candidate
        run: |
          timeout 120 bash -c 'until curl -fsS http://127.0.0.1:4100/api/readyz; do sleep 1; done'

      - name: Run acceptance tests
        env:
          ADE_BASE_URL: http://127.0.0.1:4100
        run: pnpm test:acceptance

      - name: Stop release candidate
        if: always()
        run: docker rm --force ade-acceptance || true

  release_stage:
    name: Release Stage
    if: github.event_name == 'push'
    needs:
      - commit_stage
      - acceptance_stage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.ADE_NODE_VERSION }}

      - name: Log in to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}

      - name: Deploy accepted release candidate
        env:
          ADE_IMAGE: ${{ needs.commit_stage.outputs.image }}
        run: >
          az deployment group create
          --name "ade-production-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}"
          --parameters-file infra/environments/main.prod.bicepparam
