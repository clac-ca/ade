name: ADE Platform Development Pipeline

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/platform-development-pipeline.yml
      - .node-version
      - Dockerfile
      - apps/ade-api/**
      - apps/ade-web/**
      - infra/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - scripts/**/*.ts
      - tsconfig.base.json
      - tsconfig.scripts.json
  push:
    branches:
      - main
    paths:
      - .github/workflows/platform-development-pipeline.yml
      - .node-version
      - Dockerfile
      - apps/ade-api/**
      - apps/ade-web/**
      - infra/**
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - scripts/**/*.ts
      - tsconfig.base.json
      - tsconfig.scripts.json

concurrency:
  # PRs cancel older runs. Pushes to main keep one running release and only the
  # newest pending release candidate for the shared production stream.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  IMAGE_NAME: ${{ github.repository_owner }}/ade-platform
  REGISTRY: ghcr.io

jobs:
  commit_stage:
    name: Commit Stage
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write
    outputs:
      release_candidate_image: ${{ steps.release_candidate_ref.outputs.release_candidate_image }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_title: ${{ steps.version.outputs.release_title }}
      release_version: ${{ steps.version.outputs.release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .node-version

      - name: Set up Rust
        run: |
          rustup toolchain install 1.94.0 --profile minimal --component clippy --component rustfmt
          rustup default 1.94.0

      - name: Compute platform release version
        id: version
        run: |
          commit_timestamp="$(git show -s --format=%cI "${GITHUB_SHA}")"
          release_version="$(
            COMMIT_TIMESTAMP="${commit_timestamp}" python3 - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import os

          now = datetime.fromisoformat(os.environ["COMMIT_TIMESTAMP"]).astimezone(
              ZoneInfo("America/Vancouver")
          )
          print(f"{now.year}.{now.month}.{now.day}.{os.environ['GITHUB_RUN_NUMBER']}")
          PY
          )"

          echo "release_version=${release_version}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=ade-platform-v${release_version}" >> "${GITHUB_OUTPUT}"
          echo "release_title=ADE Platform ${release_version}" >> "${GITHUB_OUTPUT}"

      - name: Restore Rust cache
        id: rust_cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
            apps/ade-api/target
          key: rust-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', 'apps/ade-api/Cargo.toml', 'apps/ade-api/Cargo.lock') }}
          restore-keys: |
            rust-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run TypeScript typecheck
        run: pnpm typecheck

      - name: Run lint
        run: |
          pnpm --filter @ade/api lint
          pnpm exec eslint .
          az bicep lint --file infra/main.bicep

      - name: Run unit tests
        run: pnpm test:unit

      - name: Save Rust cache
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.rust_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
            apps/ade-api/target
          key: ${{ steps.rust_cache.outputs.cache-primary-key }}

      - name: Extract image tags and labels
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Bicep compilation
        run: |
          az bicep build --file infra/main.bicep --stdout >/dev/null
          az bicep build-params --file infra/environments/main.prod.bicepparam --stdout >/dev/null

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          driver: docker-container

      - name: Restore BuildKit Cargo cache
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        id: buildkit_cargo_cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ${{ runner.temp }}/buildkit-cargo-cache/ade-api-target
            ${{ runner.temp }}/buildkit-cargo-cache/ade-api-cargo-git
            ${{ runner.temp }}/buildkit-cargo-cache/ade-api-cargo-registry
          key: ${{ github.event_name == 'push' && format('buildkit-cargo-main-{0}-{1}', runner.os, hashFiles('Dockerfile', 'rust-toolchain.toml', 'apps/ade-api/Cargo.lock', 'apps/ade-api/Cargo.toml')) || format('buildkit-cargo-pr-{0}-{1}-{2}', github.event.pull_request.number, runner.os, hashFiles('Dockerfile', 'rust-toolchain.toml', 'apps/ade-api/Cargo.lock', 'apps/ade-api/Cargo.toml')) }}
          restore-keys: |
            ${{ github.event_name == 'pull_request' && format('buildkit-cargo-pr-{0}-{1}-', github.event.pull_request.number, runner.os) || '' }}
            buildkit-cargo-main-${{ runner.os }}-

      - name: Restore BuildKit Cargo cache mounts
        if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
        uses: reproducible-containers/buildkit-cache-dance@5de31fc1534ed8789e63d41ea933c5df9944a261 # v3.1.0
        with:
          cache-map: |
            {
              "${{ runner.temp }}/buildkit-cargo-cache/ade-api-target": {
                "target": "/build/apps/ade-api/target",
                "id": "ade-api-target"
              },
              "${{ runner.temp }}/buildkit-cargo-cache/ade-api-cargo-git": {
                "target": "/usr/local/cargo/git/db",
                "id": "ade-api-cargo-git"
              },
              "${{ runner.temp }}/buildkit-cargo-cache/ade-api-cargo-registry": {
                "target": "/usr/local/cargo/registry",
                "id": "ade-api-cargo-registry"
              }
            }
          skip-extraction: ${{ steps.buildkit_cargo_cache.outputs.cache-hit == 'true' }}

      - name: Build release candidate image (PR same-repo)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          build-args: |
            SERVICE_VERSION=${{ steps.version.outputs.release_version }}
          cache-from: |
            type=gha,scope=ade-platform-release-candidate-pr-${{ github.event.pull_request.number }}
            type=gha,scope=ade-platform-release-candidate-main
            type=gha,scope=ade-platform-release-candidate
          cache-to: type=gha,scope=ade-platform-release-candidate-pr-${{ github.event.pull_request.number }},mode=max
          context: .
          file: ./Dockerfile
          labels: ${{ steps.meta.outputs.labels }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}

      - name: Build release candidate image (PR fork)
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          build-args: |
            SERVICE_VERSION=${{ steps.version.outputs.release_version }}
          cache-from: |
            type=gha,scope=ade-platform-release-candidate-main
            type=gha,scope=ade-platform-release-candidate
          context: .
          file: ./Dockerfile
          labels: ${{ steps.meta.outputs.labels }}
          push: false
          tags: ${{ steps.meta.outputs.tags }}

      - name: Build release candidate image (push)
        if: github.event_name == 'push'
        id: push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          build-args: |
            SERVICE_VERSION=${{ steps.version.outputs.release_version }}
          cache-from: |
            type=gha,scope=ade-platform-release-candidate-main
            type=gha,scope=ade-platform-release-candidate
          cache-to: type=gha,scope=ade-platform-release-candidate-main,mode=max
          context: .
          file: ./Dockerfile
          labels: ${{ steps.meta.outputs.labels }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}

      - name: Export release candidate image ref
        if: github.event_name == 'push'
        id: release_candidate_ref
        run: |
          echo "release_candidate_image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.push.outputs.digest }}" >> "${GITHUB_OUTPUT}"

  acceptance_stage:
    name: Acceptance Stage
    if: github.event_name == 'push'
    needs:
      - commit_stage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .node-version

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull release candidate
        run: docker pull "${{ needs.commit_stage.outputs.release_candidate_image }}"

      - name: Run acceptance tests
        run: pnpm test:acceptance --image "${{ needs.commit_stage.outputs.release_candidate_image }}"

  release_stage:
    name: Release Stage
    if: github.event_name == 'push'
    needs:
      - commit_stage
      - acceptance_stage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: production
    environment:
      name: production
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}

      - name: Validate release candidate deployment
        run: |
          az deployment group validate \
            --name "ade-production-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-validate" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --parameters infra/environments/main.prod.bicepparam \
            --parameters image="${{ needs.commit_stage.outputs.release_candidate_image }}" \
            --parameters runtimeSessionSecret="${{ secrets.ADE_RUNTIME_SESSION_SECRET }}" \
            --validation-level Provider \
            --output none

      - name: Deploy release candidate
        id: deploy_release_candidate
        run: |
          migration_job_name="$(
            az deployment group create \
              --name "ade-production-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --parameters infra/environments/main.prod.bicepparam \
              --parameters image="${{ needs.commit_stage.outputs.release_candidate_image }}" \
              --parameters runtimeSessionSecret="${{ secrets.ADE_RUNTIME_SESSION_SECRET }}" \
              --query properties.outputs.migrationJobName.value \
              --output tsv
          )"

          echo "migration_job_name=${migration_job_name}" >> "${GITHUB_OUTPUT}"

      - name: Run database migrations
        env:
          ADE_MIGRATION_JOB_NAME: ${{ steps.deploy_release_candidate.outputs.migration_job_name }}
        run: |
          execution_name="$(
            az containerapp job start \
              --name "${ADE_MIGRATION_JOB_NAME}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --query name \
              --output tsv
          )"

          echo "Started migration job execution: ${execution_name}"

      - name: Detect existing platform release tag
        id: tag
        env:
          RELEASE_TAG: ${{ needs.commit_stage.outputs.release_tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create and push platform release tag
        if: steps.tag.outputs.exists == 'false'
        env:
          RELEASE_TAG: ${{ needs.commit_stage.outputs.release_tag }}
          RELEASE_VERSION: ${{ needs.commit_stage.outputs.release_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" "${GITHUB_SHA}" -m "ADE Platform release ${RELEASE_VERSION}"
          git push origin "refs/tags/${RELEASE_TAG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.commit_stage.outputs.release_tag }}
          RELEASE_TITLE: ${{ needs.commit_stage.outputs.release_title }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "GitHub release ${RELEASE_TAG} already exists."
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TITLE}" \
              --verify-tag \
              --generate-notes
          fi
