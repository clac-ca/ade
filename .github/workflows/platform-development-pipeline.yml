name: ADE Platform Development Pipeline

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/platform-development-pipeline.yml
      - .node-version
      - Cargo.lock
      - Cargo.toml
      - Dockerfile
      - apps/ade-api/**
      - apps/ade-web/**
      - infra/**
      - package.json
      - packages/reverse-connect/**
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - scripts/**/*.ts
      - tsconfig.base.json
      - tsconfig.scripts.json

concurrency:
  # Keep one active platform release stream on main and discard superseded
  # pending runs behind it.
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  IMAGE_NAME: ${{ github.repository_owner }}/ade-platform
  REGISTRY: ghcr.io
  SESSIONPOOL_IMAGE_NAME: ${{ github.repository_owner }}/ade-sessionpool

jobs:
  commit_stage:
    name: Commit Stage / ${{ matrix.task_name }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout_minutes }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - task: test
            task_name: Test
            timeout_minutes: 25
          - task: build
            task_name: Build
            timeout_minutes: 35
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .node-version

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Set up Docker Buildx
        if: matrix.task == 'build'
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Compute platform release version
        if: matrix.task == 'build'
        id: version
        run: |
          commit_timestamp="$(git show -s --format=%cI "${GITHUB_SHA}")"
          release_version="$(
            COMMIT_TIMESTAMP="${commit_timestamp}" python3 - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import os

          now = datetime.fromisoformat(os.environ["COMMIT_TIMESTAMP"]).astimezone(
              ZoneInfo("America/Vancouver")
          )
          print(f"{now.year}.{now.month}.{now.day}.{os.environ['GITHUB_RUN_NUMBER']}")
          PY
          )"

          echo "release_version=${release_version}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=ade-platform-v${release_version}" >> "${GITHUB_OUTPUT}"
          echo "release_title=ADE Platform ${release_version}" >> "${GITHUB_OUTPUT}"

      - name: Set up Rust
        if: matrix.task == 'test'
        run: |
          rustup toolchain install 1.94.0 --profile minimal --component clippy --component rustfmt
          rustup default 1.94.0

      - name: Restore Rust cache
        if: matrix.task == 'test'
        id: rust_cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
            target
          key: rust-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock', 'Cargo.toml', 'apps/ade-api/Cargo.toml', 'infra/local/sessionpool/Cargo.toml', 'packages/reverse-connect/Cargo.toml') }}
          restore-keys: |
            rust-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Log in to GitHub Container Registry
        if: matrix.task == 'build'
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore BuildKit Cargo cache
        if: matrix.task == 'build'
        id: buildkit_cargo_cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ${{ runner.temp }}/buildkit-cargo-cache/ade-rust-target
            ${{ runner.temp }}/buildkit-cargo-cache/ade-rust-cargo-git
            ${{ runner.temp }}/buildkit-cargo-cache/ade-rust-cargo-registry
          key: ${{ format('buildkit-cargo-main-{0}-{1}-{2}', runner.os, hashFiles('Dockerfile', 'rust-toolchain.toml', 'Cargo.lock', 'Cargo.toml', 'apps/ade-api/Cargo.toml', 'infra/local/sessionpool/Cargo.toml', 'packages/reverse-connect/Cargo.toml'), github.sha) }}
          restore-keys: |
            buildkit-cargo-main-${{ runner.os }}-${{ hashFiles('Dockerfile', 'rust-toolchain.toml', 'Cargo.lock', 'Cargo.toml', 'apps/ade-api/Cargo.toml', 'infra/local/sessionpool/Cargo.toml', 'packages/reverse-connect/Cargo.toml') }}-

      - name: Restore BuildKit Cargo cache mounts
        if: matrix.task == 'build'
        uses: reproducible-containers/buildkit-cache-dance@5de31fc1534ed8789e63d41ea933c5df9944a261 # v3.1.0
        with:
          cache-map: |
            {
              "${{ runner.temp }}/buildkit-cargo-cache/ade-rust-target": {
                "target": "/build/target",
                "id": "ade-rust-target"
              },
              "${{ runner.temp }}/buildkit-cargo-cache/ade-rust-cargo-git": {
                "target": "/usr/local/cargo/git/db",
                "id": "ade-rust-cargo-git"
              },
              "${{ runner.temp }}/buildkit-cargo-cache/ade-rust-cargo-registry": {
                "target": "/usr/local/cargo/registry",
                "id": "ade-rust-cargo-registry"
              }
            }
          skip-extraction: ${{ steps.buildkit_cargo_cache.outputs.cache-hit == 'true' }}

      - name: Run commit-stage tests
        if: matrix.task == 'test'
        run: pnpm test

      - name: Build release candidate
        if: matrix.task == 'build'
        env:
          ADE_BUILD_CACHE_FROM: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          ADE_BUILD_CACHE_TO: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          ADE_BUILD_IMAGE: ${{ format('{0}/{1}:sha-{2}', env.REGISTRY, env.IMAGE_NAME, github.sha) }}
          ADE_BUILD_PLATFORM: linux/amd64
          ADE_BUILD_PUSH: "true"
          ADE_SERVICE_VERSION: ${{ steps.version.outputs.release_version }}
        run: pnpm build

      - name: Build acceptance session-pool image
        if: matrix.task == 'build'
        env:
          SESSIONPOOL_IMAGE: ${{ format('{0}/{1}:sha-{2}', env.REGISTRY, env.SESSIONPOOL_IMAGE_NAME, github.sha) }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            --cache-from "type=registry,ref=${{ env.REGISTRY }}/${{ env.SESSIONPOOL_IMAGE_NAME }}:buildcache" \
            --cache-to "type=registry,ref=${{ env.REGISTRY }}/${{ env.SESSIONPOOL_IMAGE_NAME }}:buildcache,mode=max" \
            --file infra/local/sessionpool/Dockerfile \
            --push \
            --tag "${SESSIONPOOL_IMAGE}" \
            .

      - name: Prepare acceptance fixtures
        if: matrix.task == 'build'
        run: pnpm exec tsx scripts/prepare-acceptance-fixtures.ts

      - name: Save BuildKit Cargo cache
        if: matrix.task == 'build' && steps.buildkit_cargo_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ${{ runner.temp }}/buildkit-cargo-cache/ade-rust-target
            ${{ runner.temp }}/buildkit-cargo-cache/ade-rust-cargo-git
            ${{ runner.temp }}/buildkit-cargo-cache/ade-rust-cargo-registry
          key: ${{ steps.buildkit_cargo_cache.outputs.cache-primary-key }}

      - name: Save Rust cache
        if: matrix.task == 'test' && steps.rust_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
            target
          key: ${{ steps.rust_cache.outputs.cache-primary-key }}

      - name: Export release candidate metadata
        if: matrix.task == 'build'
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          SESSIONPOOL_IMAGE_TAG: ${{ format('{0}/{1}:sha-{2}', env.REGISTRY, env.SESSIONPOOL_IMAGE_NAME, github.sha) }}
        run: |
          digest="$(docker buildx imagetools inspect "${IMAGE_REF}" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          sessionpool_digest="$(docker buildx imagetools inspect "${SESSIONPOOL_IMAGE_TAG}" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          {
            echo "RELEASE_CANDIDATE_IMAGE=${IMAGE_REF}@${digest}"
            echo "SESSIONPOOL_IMAGE=${SESSIONPOOL_IMAGE_TAG}@${sessionpool_digest}"
            echo "RELEASE_TAG=${{ steps.version.outputs.release_tag }}"
            echo "RELEASE_TITLE=${{ steps.version.outputs.release_title }}"
            echo "RELEASE_VERSION=${{ steps.version.outputs.release_version }}"
          } > "${RUNNER_TEMP}/release-candidate.env"

      - name: Upload release candidate metadata
        if: matrix.task == 'build'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-candidate-metadata
          path: ${{ runner.temp }}/release-candidate.env
          if-no-files-found: error

      - name: Upload acceptance fixtures
        if: matrix.task == 'build'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: acceptance-fixtures
          path: .package/configs
          if-no-files-found: error

  acceptance_stage:
    name: Acceptance Stage
    needs:
      - commit_stage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .node-version

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download release candidate metadata
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-candidate-metadata
          path: ${{ runner.temp }}/release-candidate

      - name: Download acceptance fixtures
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: acceptance-fixtures
          path: .package/configs

      - name: Load release candidate metadata
        run: cat "${{ runner.temp }}/release-candidate/release-candidate.env" >> "${GITHUB_ENV}"

      - name: Pull release candidate
        run: docker pull "${RELEASE_CANDIDATE_IMAGE}"

      - name: Pull acceptance session-pool image
        run: docker pull "${SESSIONPOOL_IMAGE}"

      - name: Run acceptance tests
        env:
          ADE_SESSIONPOOL_IMAGE: ${{ env.SESSIONPOOL_IMAGE }}
        run: pnpm test:acceptance --image "${RELEASE_CANDIDATE_IMAGE}"

  release_stage:
    name: Release Stage
    needs:
      - commit_stage
      - acceptance_stage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: production
    environment:
      name: production
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}

      - name: Download release candidate metadata
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: release-candidate-metadata
          path: ${{ runner.temp }}/release-candidate

      - name: Load release candidate metadata
        run: cat "${{ runner.temp }}/release-candidate/release-candidate.env" >> "${GITHUB_ENV}"

      - name: Validate release candidate deployment
        run: |
          az deployment group validate \
            --name "ade-production-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-validate" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --parameters infra/environments/main.prod.bicepparam \
            --parameters image="${RELEASE_CANDIDATE_IMAGE}" \
            --parameters sandboxEnvironmentSecret="${{ secrets.ADE_SANDBOX_ENVIRONMENT_SECRET }}" \
            --validation-level Provider \
            --output none

      - name: Deploy release candidate
        id: deploy_release_candidate
        run: |
          migration_job_name="$(
            az deployment group create \
              --name "ade-production-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --parameters infra/environments/main.prod.bicepparam \
              --parameters image="${RELEASE_CANDIDATE_IMAGE}" \
              --parameters sandboxEnvironmentSecret="${{ secrets.ADE_SANDBOX_ENVIRONMENT_SECRET }}" \
              --query properties.outputs.migrationJobName.value \
              --output tsv
          )"

          echo "migration_job_name=${migration_job_name}" >> "${GITHUB_OUTPUT}"

      - name: Run database migrations
        env:
          ADE_MIGRATION_JOB_NAME: ${{ steps.deploy_release_candidate.outputs.migration_job_name }}
        run: |
          execution_name="$(
            az containerapp job start \
              --name "${ADE_MIGRATION_JOB_NAME}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --query name \
              --output tsv
          )"

          echo "Started migration job execution: ${execution_name}"

      - name: Detect existing platform release tag
        id: tag
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create and push platform release tag
        if: steps.tag.outputs.exists == 'false'
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" "${GITHUB_SHA}" -m "ADE Platform release ${RELEASE_VERSION}"
          git push origin "refs/tags/${RELEASE_TAG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          RELEASE_TITLE: ${{ env.RELEASE_TITLE }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "GitHub release ${RELEASE_TAG} already exists."
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TITLE}" \
              --verify-tag \
              --generate-notes
          fi
