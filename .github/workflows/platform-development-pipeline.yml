name: ADE Platform Development Pipeline

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/platform-development-pipeline.yml
      - .node-version
      - Cargo.lock
      - Cargo.toml
      - Dockerfile
      - apps/ade-api/**
      - apps/ade-web/**
      - infra/**
      - package.json
      - packages/reverse-connect/**
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - scripts/**/*.ts
      - tsconfig.base.json
      - tsconfig.scripts.json

concurrency:
  # Keep one active platform release stream on main and discard superseded
  # pending runs behind it.
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  IMAGE_NAME: ${{ github.repository_owner }}/ade-platform
  REGISTRY: ghcr.io

jobs:
  commit_test:
    name: Commit Stage / Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .node-version

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Set up Rust
        run: |
          rustup toolchain install 1.94.0 --profile minimal --component clippy --component rustfmt
          rustup default 1.94.0

      - name: Restore Rust cache
        id: rust_cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
            target
          key: rust-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock', 'Cargo.toml', 'apps/ade-api/Cargo.toml', 'infra/local/sessionpool/Cargo.toml', 'packages/reverse-connect/Cargo.toml') }}
          restore-keys: |
            rust-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run commit-stage tests
        run: pnpm test

      - name: Save Rust cache
        if: github.ref == 'refs/heads/main' && steps.rust_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
            target
          key: ${{ steps.rust_cache.outputs.cache-primary-key }}

  commit_build:
    name: Commit Stage / Build
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
      packages: write
    outputs:
      release_candidate_image: ${{ steps.release_candidate_ref.outputs.release_candidate_image }}
      release_tag: ${{ steps.version.outputs.release_tag }}
      release_title: ${{ steps.version.outputs.release_title }}
      release_version: ${{ steps.version.outputs.release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .node-version

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Compute platform release version
        id: version
        run: |
          commit_timestamp="$(git show -s --format=%cI "${GITHUB_SHA}")"
          release_version="$(
            COMMIT_TIMESTAMP="${commit_timestamp}" python3 - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import os

          now = datetime.fromisoformat(os.environ["COMMIT_TIMESTAMP"]).astimezone(
              ZoneInfo("America/Vancouver")
          )
          print(f"{now.year}.{now.month}.{now.day}.{os.environ['GITHUB_RUN_NUMBER']}")
          PY
          )"

          echo "release_version=${release_version}" >> "${GITHUB_OUTPUT}"
          echo "release_tag=ade-platform-v${release_version}" >> "${GITHUB_OUTPUT}"
          echo "release_title=ADE Platform ${release_version}" >> "${GITHUB_OUTPUT}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore Buildx layer cache
        id: buildx_layer_cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ runner.temp }}/buildx-layer-cache
          key: ${{ format('buildx-layer-main-{0}-{1}-{2}', runner.os, hashFiles('Dockerfile', '.node-version', 'package.json', 'pnpm-lock.yaml', 'pnpm-workspace.yaml', 'apps/ade-api/package.json', 'apps/ade-web/package.json', 'apps/ade-api/sandbox-environment/**', 'apps/ade-web/**', 'packages/reverse-connect/**', 'scripts/**/*.ts', 'infra/main.bicep', 'infra/environments/main.prod.bicepparam'), github.sha) }}
          restore-keys: |
            buildx-layer-main-${{ runner.os }}-${{ hashFiles('Dockerfile', '.node-version', 'package.json', 'pnpm-lock.yaml', 'pnpm-workspace.yaml', 'apps/ade-api/package.json', 'apps/ade-web/package.json', 'apps/ade-api/sandbox-environment/**', 'apps/ade-web/**', 'packages/reverse-connect/**', 'scripts/**/*.ts', 'infra/main.bicep', 'infra/environments/main.prod.bicepparam') }}-

      - name: Ensure Buildx layer cache directory
        run: mkdir -p "${{ runner.temp }}/buildx-layer-cache"

      - name: Restore BuildKit Cargo cache
        id: buildkit_cargo_cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ${{ runner.temp }}/buildkit-cargo-cache/ade-target
            ${{ runner.temp }}/buildkit-cargo-cache/ade-api-cargo-git
            ${{ runner.temp }}/buildkit-cargo-cache/ade-api-cargo-registry
            ${{ runner.temp }}/buildkit-cargo-cache/ade-reverse-connect-target
            ${{ runner.temp }}/buildkit-cargo-cache/ade-reverse-connect-cargo-git
            ${{ runner.temp }}/buildkit-cargo-cache/ade-reverse-connect-cargo-registry
          key: ${{ format('buildkit-cargo-main-{0}-{1}-{2}', runner.os, hashFiles('Dockerfile', 'packages/reverse-connect/Dockerfile.build', 'rust-toolchain.toml', 'Cargo.lock', 'Cargo.toml', 'apps/ade-api/Cargo.toml', 'infra/local/sessionpool/Cargo.toml', 'packages/reverse-connect/Cargo.toml'), github.sha) }}
          restore-keys: |
            buildkit-cargo-main-${{ runner.os }}-${{ hashFiles('Dockerfile', 'packages/reverse-connect/Dockerfile.build', 'rust-toolchain.toml', 'Cargo.lock', 'Cargo.toml', 'apps/ade-api/Cargo.toml', 'infra/local/sessionpool/Cargo.toml', 'packages/reverse-connect/Cargo.toml') }}-

      - name: Restore BuildKit Cargo cache mounts
        uses: reproducible-containers/buildkit-cache-dance@5de31fc1534ed8789e63d41ea933c5df9944a261 # v3.1.0
        with:
          cache-map: |
            {
              "${{ runner.temp }}/buildkit-cargo-cache/ade-target": {
                "target": "/build/target",
                "id": "ade-target"
              },
              "${{ runner.temp }}/buildkit-cargo-cache/ade-api-cargo-git": {
                "target": "/usr/local/cargo/git/db",
                "id": "ade-api-cargo-git"
              },
              "${{ runner.temp }}/buildkit-cargo-cache/ade-api-cargo-registry": {
                "target": "/usr/local/cargo/registry",
                "id": "ade-api-cargo-registry"
              },
              "${{ runner.temp }}/buildkit-cargo-cache/ade-reverse-connect-target": {
                "target": "/cargo-target",
                "id": "ade-reverse-connect-target"
              },
              "${{ runner.temp }}/buildkit-cargo-cache/ade-reverse-connect-cargo-git": {
                "target": "/usr/local/cargo/git/db",
                "id": "ade-reverse-connect-cargo-git"
              },
              "${{ runner.temp }}/buildkit-cargo-cache/ade-reverse-connect-cargo-registry": {
                "target": "/usr/local/cargo/registry",
                "id": "ade-reverse-connect-cargo-registry"
              }
            }
          skip-extraction: ${{ steps.buildkit_cargo_cache.outputs.cache-hit == 'true' }}

      - name: Build release candidate
        env:
          ADE_BUILD_CACHE_FROM: type=local,src=${{ runner.temp }}/buildx-layer-cache
          ADE_BUILD_CACHE_TO: type=local,dest=${{ runner.temp }}/buildx-layer-cache-new,mode=max
          ADE_BUILD_IMAGE: ${{ format('{0}/{1}:sha-{2}', env.REGISTRY, env.IMAGE_NAME, github.sha) }}
          ADE_BUILD_PUSH: "true"
          ADE_SERVICE_VERSION: ${{ steps.version.outputs.release_version }}
        run: pnpm build

      - name: Finalize Buildx layer cache
        run: |
          rm -rf "${{ runner.temp }}/buildx-layer-cache"
          if [ -d "${{ runner.temp }}/buildx-layer-cache-new" ]; then
            mv "${{ runner.temp }}/buildx-layer-cache-new" "${{ runner.temp }}/buildx-layer-cache"
          fi

      - name: Save Buildx layer cache
        if: steps.buildx_layer_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ runner.temp }}/buildx-layer-cache
          key: ${{ steps.buildx_layer_cache.outputs.cache-primary-key }}

      - name: Save BuildKit Cargo cache
        if: steps.buildkit_cargo_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ${{ runner.temp }}/buildkit-cargo-cache/ade-target
            ${{ runner.temp }}/buildkit-cargo-cache/ade-api-cargo-git
            ${{ runner.temp }}/buildkit-cargo-cache/ade-api-cargo-registry
            ${{ runner.temp }}/buildkit-cargo-cache/ade-reverse-connect-target
            ${{ runner.temp }}/buildkit-cargo-cache/ade-reverse-connect-cargo-git
            ${{ runner.temp }}/buildkit-cargo-cache/ade-reverse-connect-cargo-registry
          key: ${{ steps.buildkit_cargo_cache.outputs.cache-primary-key }}

      - name: Export release candidate image ref
        id: release_candidate_ref
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
        run: |
          digest="$(docker buildx imagetools inspect "${IMAGE_REF}" --format '{{json .Manifest.Digest}}' | tr -d '"')"
          echo "release_candidate_image=${IMAGE_REF}@${digest}" >> "${GITHUB_OUTPUT}"

  acceptance_stage:
    name: Acceptance Stage
    needs:
      - commit_test
      - commit_build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .node-version

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull release candidate
        run: docker pull "${{ needs.commit_build.outputs.release_candidate_image }}"

      - name: Run acceptance tests
        run: pnpm test:acceptance --image "${{ needs.commit_build.outputs.release_candidate_image }}"

  release_stage:
    name: Release Stage
    needs:
      - commit_build
      - acceptance_stage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: production
    environment:
      name: production
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}

      - name: Validate release candidate deployment
        run: |
          az deployment group validate \
            --name "ade-production-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-validate" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --parameters infra/environments/main.prod.bicepparam \
            --parameters image="${{ needs.commit_build.outputs.release_candidate_image }}" \
            --parameters sandboxEnvironmentSecret="${{ secrets.ADE_SANDBOX_ENVIRONMENT_SECRET }}" \
            --validation-level Provider \
            --output none

      - name: Deploy release candidate
        id: deploy_release_candidate
        run: |
          migration_job_name="$(
            az deployment group create \
              --name "ade-production-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --parameters infra/environments/main.prod.bicepparam \
              --parameters image="${{ needs.commit_build.outputs.release_candidate_image }}" \
              --parameters sandboxEnvironmentSecret="${{ secrets.ADE_SANDBOX_ENVIRONMENT_SECRET }}" \
              --query properties.outputs.migrationJobName.value \
              --output tsv
          )"

          echo "migration_job_name=${migration_job_name}" >> "${GITHUB_OUTPUT}"

      - name: Run database migrations
        env:
          ADE_MIGRATION_JOB_NAME: ${{ steps.deploy_release_candidate.outputs.migration_job_name }}
        run: |
          execution_name="$(
            az containerapp job start \
              --name "${ADE_MIGRATION_JOB_NAME}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --query name \
              --output tsv
          )"

          echo "Started migration job execution: ${execution_name}"

      - name: Detect existing platform release tag
        id: tag
        env:
          RELEASE_TAG: ${{ needs.commit_build.outputs.release_tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create and push platform release tag
        if: steps.tag.outputs.exists == 'false'
        env:
          RELEASE_TAG: ${{ needs.commit_build.outputs.release_tag }}
          RELEASE_VERSION: ${{ needs.commit_build.outputs.release_version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" "${GITHUB_SHA}" -m "ADE Platform release ${RELEASE_VERSION}"
          git push origin "refs/tags/${RELEASE_TAG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.commit_build.outputs.release_tag }}
          RELEASE_TITLE: ${{ needs.commit_build.outputs.release_title }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "GitHub release ${RELEASE_TAG} already exists."
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TITLE}" \
              --verify-tag \
              --generate-notes
          fi
