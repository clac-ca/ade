name: ADE Platform Development Pipeline

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/platform-development-pipeline.yml
      - .node-version
      - Cargo.lock
      - Cargo.toml
      - Dockerfile
      - apps/ade-api/**
      - apps/ade-web/**
      - infra/**
      - package.json
      - apps/ade-api/crates/reverse-connect/**
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - scripts/**/*.ts
      - tsconfig.base.json
      - tsconfig.scripts.json

concurrency:
  # Keep one active platform release stream on main and discard superseded
  # pending runs behind it.
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  IMAGE_NAME: ${{ github.repository_owner }}/ade-platform
  PRODUCTION_MIGRATION_JOB_NAME: job-ade-migrate-prod-cc-002
  REGISTRY: ghcr.io

jobs:
  commit_test:
    name: Commit Stage / Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .node-version

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Set up Rust
        run: |
          rustup toolchain install 1.94.0 --profile minimal --component clippy --component rustfmt
          rustup default 1.94.0

      - name: Restore Rust cache
        id: rust_cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
            target
          key: rust-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock', 'Cargo.toml', 'apps/ade-api/Cargo.toml', 'apps/ade-api/crates/reverse-connect/Cargo.toml') }}
          restore-keys: |
            rust-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run commit-stage tests
        run: pnpm test

      - name: Save Rust cache
        if: steps.rust_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/registry/cache
            ~/.cargo/registry/index
            ~/.cargo/git/db
            target
          key: ${{ steps.rust_cache.outputs.cache-primary-key }}

  commit_build_candidate:
    name: Commit Stage / Build Candidate
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .node-version

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore BuildKit Cargo cache
        id: buildkit_cargo_cache
        uses: actions/cache/restore@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ${{ runner.temp }}/buildkit-cargo-cache/ade-rust-target
            ${{ runner.temp }}/buildkit-cargo-cache/ade-rust-cargo-git
            ${{ runner.temp }}/buildkit-cargo-cache/ade-rust-cargo-registry
          key: ${{ format('buildkit-cargo-main-{0}-{1}-{2}', runner.os, hashFiles('Dockerfile', 'rust-toolchain.toml', 'Cargo.lock', 'Cargo.toml', 'apps/ade-api/Cargo.toml', 'apps/ade-api/crates/reverse-connect/Cargo.toml'), github.sha) }}
          restore-keys: |
            buildkit-cargo-main-${{ runner.os }}-${{ hashFiles('Dockerfile', 'rust-toolchain.toml', 'Cargo.lock', 'Cargo.toml', 'apps/ade-api/Cargo.toml', 'apps/ade-api/crates/reverse-connect/Cargo.toml') }}-

      - name: Restore BuildKit Cargo cache mounts
        uses: reproducible-containers/buildkit-cache-dance@5de31fc1534ed8789e63d41ea933c5df9944a261 # v3.1.0
        with:
          cache-map: |
            {
              "${{ runner.temp }}/buildkit-cargo-cache/ade-rust-target": {
                "target": "/build/target",
                "id": "ade-rust-target"
              },
              "${{ runner.temp }}/buildkit-cargo-cache/ade-rust-cargo-git": {
                "target": "/usr/local/cargo/git/db",
                "id": "ade-rust-cargo-git"
              },
              "${{ runner.temp }}/buildkit-cargo-cache/ade-rust-cargo-registry": {
                "target": "/usr/local/cargo/registry",
                "id": "ade-rust-cargo-registry"
              }
            }
          skip-extraction: ${{ steps.buildkit_cargo_cache.outputs.cache-hit == 'true' }}

      - name: Build release candidate
        env:
          ADE_BUILD_CACHE_FROM: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          ADE_BUILD_CACHE_TO: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          ADE_BUILD_IMAGE: ${{ format('{0}/{1}:sha-{2}', env.REGISTRY, env.IMAGE_NAME, github.sha) }}
          ADE_BUILD_PLATFORM: linux/amd64
          ADE_BUILD_PUSH: "true"
        run: |
          commit_timestamp="$(git show -s --format=%cI "${GITHUB_SHA}")"
          release_version="$(
            COMMIT_TIMESTAMP="${commit_timestamp}" python3 - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import os

          now = datetime.fromisoformat(os.environ["COMMIT_TIMESTAMP"]).astimezone(
              ZoneInfo("America/Vancouver")
          )
          print(f"{now.year}.{now.month}.{now.day}.{os.environ['GITHUB_RUN_NUMBER']}")
          PY
          )"

          export ADE_SERVICE_VERSION="${release_version}"
          pnpm build

      - name: Save BuildKit Cargo cache
        if: steps.buildkit_cargo_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ${{ runner.temp }}/buildkit-cargo-cache/ade-rust-target
            ${{ runner.temp }}/buildkit-cargo-cache/ade-rust-cargo-git
            ${{ runner.temp }}/buildkit-cargo-cache/ade-rust-cargo-registry
          key: ${{ steps.buildkit_cargo_cache.outputs.cache-primary-key }}

  acceptance_stage:
    name: Acceptance Stage
    needs:
      - commit_test
      - commit_build_candidate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
    env:
      CANDIDATE_IMAGE: ${{ format('ghcr.io/{0}/ade-platform:sha-{1}', github.repository_owner, github.sha) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version-file: .node-version

      - name: Set up uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Pull release candidate
        run: docker pull "${CANDIDATE_IMAGE}"

      - name: Run acceptance tests
        run: pnpm test:acceptance --image "${CANDIDATE_IMAGE}"

  release_stage:
    name: Release Stage
    needs:
      - acceptance_stage
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: production
    environment:
      name: production
    permissions:
      contents: write
      id-token: write
    env:
      CANDIDATE_IMAGE: ${{ format('ghcr.io/{0}/ade-platform:sha-{1}', github.repository_owner, github.sha) }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ vars.AZURE_DEPLOY_CLIENT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}

      - name: Compute platform release metadata
        run: |
          commit_timestamp="$(git show -s --format=%cI "${GITHUB_SHA}")"
          release_version="$(
            COMMIT_TIMESTAMP="${commit_timestamp}" python3 - <<'PY'
          from datetime import datetime
          from zoneinfo import ZoneInfo
          import os

          now = datetime.fromisoformat(os.environ["COMMIT_TIMESTAMP"]).astimezone(
              ZoneInfo("America/Vancouver")
          )
          print(f"{now.year}.{now.month}.{now.day}.{os.environ['GITHUB_RUN_NUMBER']}")
          PY
          )"

          {
            echo "RELEASE_VERSION=${release_version}"
            echo "RELEASE_TAG=ade-platform-v${release_version}"
            echo "RELEASE_TITLE=ADE Platform ${release_version}"
          } >> "${GITHUB_ENV}"

      - name: Validate release candidate deployment
        run: |
          az deployment group validate \
            --name "ade-production-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-validate" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters image="${CANDIDATE_IMAGE}" \
            --validation-level Provider \
            --output none

      - name: Deploy release candidate
        run: |
          az deployment group create \
            --name "ade-production-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --template-file infra/main.bicep \
            --parameters image="${CANDIDATE_IMAGE}" \
            --output none

      - name: Run database migrations
        run: |
          execution_name="$(
            az containerapp job start \
              --name "${PRODUCTION_MIGRATION_JOB_NAME}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --query name \
              --output tsv
          )"

          echo "Started migration job execution: ${execution_name}"

      - name: Detect existing platform release tag
        id: tag
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Create and push platform release tag
        if: steps.tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${RELEASE_TAG}" "${GITHUB_SHA}" -m "ADE Platform release ${RELEASE_VERSION}"
          git push origin "refs/tags/${RELEASE_TAG}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "GitHub release ${RELEASE_TAG} already exists."
          else
            gh release create "${RELEASE_TAG}" \
              --title "${RELEASE_TITLE}" \
              --verify-tag \
              --generate-notes
          fi
