name: Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Enable Corepack
        run: |
          corepack enable
          corepack install

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv==0.9.28

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: Check Python packages
        run: pnpm check:python

      - name: Build release candidate
        run: pnpm build

      - name: Smoke built runtime
        run: pnpm smoke

      - name: Log in to OCI registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCI_REGISTRY }}
          username: ${{ secrets.OCI_USERNAME }}
          password: ${{ secrets.OCI_PASSWORD }}

      - name: Publish built release candidate
        id: publish-release-candidate
        if: github.event_name == 'push'
        env:
          OCI_NAMESPACE: ${{ secrets.OCI_NAMESPACE }}
          OCI_REGISTRY: ${{ secrets.OCI_REGISTRY }}
        run: |
          set -euo pipefail
          release_tag="sha-${GITHUB_SHA}-run-${GITHUB_RUN_ID}-attempt-${GITHUB_RUN_ATTEMPT}"
          web_ref="${OCI_REGISTRY}/${OCI_NAMESPACE}/ade-web:${release_tag}"
          api_ref="${OCI_REGISTRY}/${OCI_NAMESPACE}/ade-api:${release_tag}"
          docker image tag ade-web:local "${web_ref}"
          docker image tag ade-api:local "${api_ref}"
          docker image push "${web_ref}"
          docker image push "${api_ref}"
          echo "web_ref=${web_ref}" >> "$GITHUB_OUTPUT"
          echo "api_ref=${api_ref}" >> "$GITHUB_OUTPUT"

      - name: Write release candidate metadata
        if: github.event_name == 'push'
        env:
          API_REF: ${{ steps.publish-release-candidate.outputs.api_ref }}
          COMMIT_SHA: ${{ github.sha }}
          WEB_REF: ${{ steps.publish-release-candidate.outputs.web_ref }}
        run: |
          set -euo pipefail
          WEB_DIGEST="$(docker buildx imagetools inspect "${WEB_REF}" --format '{{json .}}' | node -e "let data = ''; process.stdin.on('data', (chunk) => { data += chunk }); process.stdin.on('end', () => { process.stdout.write(JSON.parse(data).manifest.digest) })")"
          API_DIGEST="$(docker buildx imagetools inspect "${API_REF}" --format '{{json .}}' | node -e "let data = ''; process.stdin.on('data', (chunk) => { data += chunk }); process.stdin.on('end', () => { process.stdout.write(JSON.parse(data).manifest.digest) })")"
          WEB_REPO="${WEB_REF%:*}"
          API_REPO="${API_REF%:*}"
          WEB_REPO="${WEB_REPO}" API_REPO="${API_REPO}" WEB_DIGEST="${WEB_DIGEST}" API_DIGEST="${API_DIGEST}" node -e "const fs = require('node:fs'); fs.writeFileSync('release-candidate.json', JSON.stringify({ commitSha: process.env.COMMIT_SHA, webDigest: `${process.env.WEB_REPO}@${process.env.WEB_DIGEST}`, apiDigest: `${process.env.API_REPO}@${process.env.API_DIGEST}` }, null, 2) + '\n')"

      - name: Upload release candidate metadata
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate
          path: release-candidate.json
