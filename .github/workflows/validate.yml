name: Commit Stage

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          package-manager-cache: false

      - name: Enable Corepack
        run: |
          corepack enable
          corepack install

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install uv
        run: python -m pip install --disable-pip-version-check uv==0.9.28

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check
        run: pnpm check

      - name: Check Python packages
        run: pnpm check:python

      - name: Prepare release-candidate artifacts
        run: node scripts/build-artifacts.mjs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract web image metadata
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/ade-web
          tags: |
            type=raw,value=sha-${{ github.sha }}-run-${{ github.run_id }}-attempt-${{ github.run_attempt }}

      - name: Extract API image metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/ade-api
          tags: |
            type=raw,value=sha-${{ github.sha }}-run-${{ github.run_id }}-attempt-${{ github.run_attempt }}

      - name: Build web release candidate image
        id: build-web
        uses: docker/build-push-action@v7
        with:
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          context: apps/web
          file: apps/web/Dockerfile
          labels: ${{ steps.meta-web.outputs.labels }}
          load: true
          push: ${{ github.event_name == 'push' }}
          provenance: false
          sbom: false
          tags: ${{ steps.meta-web.outputs.tags }}

      - name: Build API release candidate image
        id: build-api
        uses: docker/build-push-action@v7
        with:
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          context: apps/api
          file: apps/api/Dockerfile
          labels: ${{ steps.meta-api.outputs.labels }}
          load: true
          push: ${{ github.event_name == 'push' }}
          provenance: false
          sbom: false
          tags: ${{ steps.meta-api.outputs.tags }}

      - name: Smoke built runtime
        env:
          ADE_API_IMAGE: ${{ steps.meta-api.outputs.tags }}
          ADE_WEB_IMAGE: ${{ steps.meta-web.outputs.tags }}
        run: pnpm smoke

      - name: Write release candidate metadata
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          WEB_REF="$(printf '%s\n' '${{ steps.meta-web.outputs.tags }}' | head -n 1)"
          API_REF="$(printf '%s\n' '${{ steps.meta-api.outputs.tags }}' | head -n 1)"
          WEB_REPO="${WEB_REF%:*}"
          API_REPO="${API_REF%:*}"
          WEB_REPO="${WEB_REPO}" API_REPO="${API_REPO}" WEB_DIGEST="${{ steps.build-web.outputs.digest }}" API_DIGEST="${{ steps.build-api.outputs.digest }}" COMMIT_SHA="${{ github.sha }}" node -e "const fs = require('node:fs'); fs.writeFileSync('release-candidate.json', JSON.stringify({ commitSha: process.env.COMMIT_SHA, webDigest: `${process.env.WEB_REPO}@${process.env.WEB_DIGEST}`, apiDigest: `${process.env.API_REPO}@${process.env.API_DIGEST}` }, null, 2) + '\n')"

      - name: Upload release candidate metadata
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: release-candidate
          path: release-candidate.json
