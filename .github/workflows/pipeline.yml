name: deployment-pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      candidate_tag:
        description: "Accepted candidate tag to redeploy (candidate-<40-character commit sha>)"
        required: true
        type: string

defaults:
  run:
    shell: bash

env:
  ADE_NODE_VERSION: "22.12.0"
  ADE_PNPM_VERSION: "10.30.1"

permissions: {}

jobs:
  commit_verify:
    name: commit-stage / verify
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: ${{ env.ADE_PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version: ${{ env.ADE_NODE_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Run fast verification contract
        run: node scripts/test-fast.mjs

  candidate_build_and_smoke:
    name: commit-stage / build-and-smoke
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: ${{ env.ADE_PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          node-version: ${{ env.ADE_NODE_VERSION }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Build candidate artifacts and images
        run: pnpm run build

      - name: Run candidate smoke contract
        run: pnpm run test:smoke

      - name: Export candidate images
        run: node scripts/export-candidate-images.mjs

      - name: Upload candidate build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          if-no-files-found: error
          name: candidate-build-${{ github.sha }}
          path: candidate-build-artifact
          retention-days: 1

  publish_candidate:
    name: commit-stage / publish
    if: github.event_name == 'push'
    needs:
      - commit_verify
      - candidate_build_and_smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    outputs:
      api_ref: ${{ steps.publish.outputs.api_ref }}
      candidate_sha: ${{ steps.publish.outputs.candidate_sha }}
      web_ref: ${{ steps.publish.outputs.web_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.ADE_NODE_VERSION }}

      - name: Download candidate build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: candidate-build-${{ github.sha }}
          path: candidate-build-artifact

      - name: Load candidate images
        run: node scripts/load-candidate-images.mjs --artifact-dir candidate-build-artifact

      - name: Log in to GitHub Container Registry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GITHUB_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Publish immutable candidate images
        id: publish
        run: node scripts/publish-candidate.mjs

      - name: Upload candidate manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          if-no-files-found: error
          name: candidate-manifest-${{ github.sha }}
          path: candidate-manifest.json
          retention-days: 30

  acceptance_stage:
    name: acceptance-stage
    if: github.event_name == 'push'
    needs:
      - publish_candidate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: acceptance
    permissions:
      contents: write
      id-token: write
    outputs:
      candidate_tag: ${{ steps.candidate_tag.outputs.candidate_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: ${{ env.ADE_PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.ADE_NODE_VERSION }}

      - name: Log in to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}

      - name: Deploy candidate to acceptance
        id: acceptance_deploy
        env:
          ADE_API_IMAGE: ${{ needs.publish_candidate.outputs.api_ref }}
          ADE_REGISTRY_PASSWORD: ${{ secrets.ADE_REGISTRY_PASSWORD }}
          ADE_REGISTRY_SERVER: ${{ vars.ADE_REGISTRY_SERVER }}
          ADE_REGISTRY_USERNAME: ${{ vars.ADE_REGISTRY_USERNAME }}
          ADE_WEB_IMAGE: ${{ needs.publish_candidate.outputs.web_ref }}
        run: >
          pnpm run deploy:aca -- --environment acceptance
          --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}"
          --parameters-file infra/environments/main.acceptance.bicepparam
          --manifest-path acceptance-deployment-manifest.json

      - name: Smoke test acceptance deployment
        id: acceptance_smoke
        env:
          ADE_BASE_URL: ${{ steps.acceptance_deploy.outputs.web_url }}
        run: pnpm run test:smoke

      - name: Run acceptance contract
        id: acceptance_contract
        env:
          ADE_BASE_URL: ${{ steps.acceptance_deploy.outputs.web_url }}
        run: pnpm run test:acceptance

      - name: Tag accepted candidate
        id: candidate_tag
        env:
          ACCEPTANCE_API_REVISION: ${{ steps.acceptance_deploy.outputs.api_revision }}
          ACCEPTANCE_WEB_REVISION: ${{ steps.acceptance_deploy.outputs.web_revision }}
          ACCEPTANCE_WEB_URL: ${{ steps.acceptance_deploy.outputs.web_url }}
          API_REF: ${{ needs.publish_candidate.outputs.api_ref }}
          CANDIDATE_SHA: ${{ needs.publish_candidate.outputs.candidate_sha }}
          WEB_REF: ${{ needs.publish_candidate.outputs.web_ref }}
        run: node scripts/create-candidate-tag.mjs

      - name: Upload acceptance deployment manifest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          if-no-files-found: error
          name: acceptance-deployment-${{ github.sha }}
          path: acceptance-deployment-manifest.json
          retention-days: 30

  production_release:
    name: production-release
    if: github.event_name == 'push'
    needs:
      - acceptance_stage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: production-release
      cancel-in-progress: false
    environment:
      name: production
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: ${{ env.ADE_PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.ADE_NODE_VERSION }}

      - name: Resolve accepted candidate
        id: candidate
        run: node scripts/resolve-candidate-tag.mjs --tag "${{ needs.acceptance_stage.outputs.candidate_tag }}"

      - name: Log in to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}

      - name: Deploy accepted candidate to production
        id: production_deploy
        env:
          ADE_API_IMAGE: ${{ steps.candidate.outputs.api_ref }}
          ADE_REGISTRY_PASSWORD: ${{ secrets.ADE_REGISTRY_PASSWORD }}
          ADE_REGISTRY_SERVER: ${{ vars.ADE_REGISTRY_SERVER }}
          ADE_REGISTRY_USERNAME: ${{ vars.ADE_REGISTRY_USERNAME }}
          ADE_WEB_IMAGE: ${{ steps.candidate.outputs.web_ref }}
        run: >
          pnpm run deploy:aca -- --environment production
          --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}"
          --parameters-file infra/environments/main.prod.bicepparam
          --manifest-path production-deployment-manifest.json

      - name: Smoke test production deployment
        id: production_smoke
        env:
          ADE_BASE_URL: ${{ steps.production_deploy.outputs.web_url }}
        run: pnpm run test:smoke

      - name: Resolve previous release for rollback
        id: previous_release
        if: failure() && steps.production_deploy.outcome == 'success' && steps.production_smoke.outcome == 'failure'
        run: node scripts/resolve-latest-release.mjs

      - name: Roll back production to previous release
        id: rollback_deploy
        if: failure() && steps.previous_release.outputs.found == 'true'
        env:
          ADE_API_IMAGE: ${{ steps.previous_release.outputs.api_ref }}
          ADE_REGISTRY_PASSWORD: ${{ secrets.ADE_REGISTRY_PASSWORD }}
          ADE_REGISTRY_SERVER: ${{ vars.ADE_REGISTRY_SERVER }}
          ADE_REGISTRY_USERNAME: ${{ vars.ADE_REGISTRY_USERNAME }}
          ADE_WEB_IMAGE: ${{ steps.previous_release.outputs.web_ref }}
        run: >
          pnpm run deploy:aca -- --environment production
          --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}"
          --parameters-file infra/environments/main.prod.bicepparam
          --manifest-path rollback-deployment-manifest.json

      - name: Smoke test rolled back production release
        if: failure() && steps.previous_release.outputs.found == 'true'
        env:
          ADE_BASE_URL: ${{ steps.rollback_deploy.outputs.web_url }}
        run: pnpm run test:smoke

      - name: Create immutable release tag
        id: release
        env:
          API_REF: ${{ steps.candidate.outputs.api_ref }}
          CANDIDATE_SHA: ${{ steps.candidate.outputs.candidate_sha }}
          CANDIDATE_TAG: ${{ steps.candidate.outputs.candidate_tag }}
          PRODUCTION_API_REVISION: ${{ steps.production_deploy.outputs.api_revision }}
          PRODUCTION_WEB_REVISION: ${{ steps.production_deploy.outputs.web_revision }}
          PRODUCTION_WEB_URL: ${{ steps.production_deploy.outputs.web_url }}
          WEB_REF: ${{ steps.candidate.outputs.web_ref }}
        run: node scripts/create-release-tag.mjs

      - name: Upload production manifests
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          if-no-files-found: ignore
          name: production-release-${{ github.sha }}
          path: |
            production-deployment-manifest.json
            rollback-deployment-manifest.json
            release-manifest.json
          retention-days: 90

  emergency_redeploy:
    name: emergency-redeploy
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: production-release
      cancel-in-progress: false
    environment:
      name: production
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: ${{ env.ADE_PNPM_VERSION }}

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ env.ADE_NODE_VERSION }}

      - name: Resolve accepted candidate
        id: candidate
        run: node scripts/resolve-candidate-tag.mjs --tag "${{ inputs.candidate_tag }}"

      - name: Log in to Azure
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}

      - name: Redeploy accepted candidate to production
        id: production_deploy
        env:
          ADE_API_IMAGE: ${{ steps.candidate.outputs.api_ref }}
          ADE_REGISTRY_PASSWORD: ${{ secrets.ADE_REGISTRY_PASSWORD }}
          ADE_REGISTRY_SERVER: ${{ vars.ADE_REGISTRY_SERVER }}
          ADE_REGISTRY_USERNAME: ${{ vars.ADE_REGISTRY_USERNAME }}
          ADE_WEB_IMAGE: ${{ steps.candidate.outputs.web_ref }}
        run: >
          pnpm run deploy:aca -- --environment production
          --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}"
          --parameters-file infra/environments/main.prod.bicepparam
          --manifest-path production-deployment-manifest.json

      - name: Smoke test production deployment
        id: production_smoke
        env:
          ADE_BASE_URL: ${{ steps.production_deploy.outputs.web_url }}
        run: pnpm run test:smoke

      - name: Resolve previous release for rollback
        id: previous_release
        if: failure() && steps.production_deploy.outcome == 'success' && steps.production_smoke.outcome == 'failure'
        run: node scripts/resolve-latest-release.mjs

      - name: Roll back production to previous release
        id: rollback_deploy
        if: failure() && steps.previous_release.outputs.found == 'true'
        env:
          ADE_API_IMAGE: ${{ steps.previous_release.outputs.api_ref }}
          ADE_REGISTRY_PASSWORD: ${{ secrets.ADE_REGISTRY_PASSWORD }}
          ADE_REGISTRY_SERVER: ${{ vars.ADE_REGISTRY_SERVER }}
          ADE_REGISTRY_USERNAME: ${{ vars.ADE_REGISTRY_USERNAME }}
          ADE_WEB_IMAGE: ${{ steps.previous_release.outputs.web_ref }}
        run: >
          pnpm run deploy:aca -- --environment production
          --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}"
          --parameters-file infra/environments/main.prod.bicepparam
          --manifest-path rollback-deployment-manifest.json

      - name: Smoke test rolled back production release
        if: failure() && steps.previous_release.outputs.found == 'true'
        env:
          ADE_BASE_URL: ${{ steps.rollback_deploy.outputs.web_url }}
        run: pnpm run test:smoke

      - name: Create immutable release tag
        id: release
        env:
          API_REF: ${{ steps.candidate.outputs.api_ref }}
          CANDIDATE_SHA: ${{ steps.candidate.outputs.candidate_sha }}
          CANDIDATE_TAG: ${{ steps.candidate.outputs.candidate_tag }}
          PRODUCTION_API_REVISION: ${{ steps.production_deploy.outputs.api_revision }}
          PRODUCTION_WEB_REVISION: ${{ steps.production_deploy.outputs.web_revision }}
          PRODUCTION_WEB_URL: ${{ steps.production_deploy.outputs.web_url }}
          WEB_REF: ${{ steps.candidate.outputs.web_ref }}
        run: node scripts/create-release-tag.mjs

      - name: Upload production manifests
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          if-no-files-found: ignore
          name: emergency-redeploy-${{ github.run_id }}
          path: |
            production-deployment-manifest.json
            rollback-deployment-manifest.json
            release-manifest.json
          retention-days: 90
